<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Praharsh Joshi — Product Manager & Enterprise Operator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <style>
    :root {
      --blue: #185FA5;
      --blue-light: #E6F1FB;
      --blue-mid: #B5D4F4;
      --blue-dark: #0C447C;
      --amber: #854F0B;
      --amber-light: #FAEEDA;
      --amber-mid: #FAC775;
      --purple: #3C3489;
      --purple-light: #EEEDFE;
      --purple-mid: #AFA9EC;
      --teal: #0F6E56;
      --teal-light: #E1F5EE;
      --teal-mid: #5DCAA5;
      --text: #1a1a1a;
      --text-muted: #6b7280;
      --text-faint: #9ca3af;
      --border: rgba(0,0,0,0.08);
      --border-mid: rgba(0,0,0,0.13);
      --bg: #fafaf8;
      --bg-card: #ffffff;
      --bg-surface: #f5f4f0;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .page { max-width: 900px; margin: auto; padding: 40px; }

    .hero-name {
      font-family: 'DM Serif Display', serif;
      font-size: 60px;
    }

    .hero-title {
      font-size: 20px;
      color: var(--text-muted);
    }

    .hero-stats {
      display: grid;
      grid-template-columns: repeat(4,1fr);
      gap: 10px;
      margin-top: 20px;
    }

    .stat {
      background: var(--bg-surface);
      padding: 10px;
      border-radius: 8px;
    }

    .stat-num {
      font-weight: bold;
    }

    .stat-label {
      font-size: 12px;
      color: var(--text-muted);
    }

  </style>
</head>

<body>

<div class="page">

<section>
  <h1 class="hero-name">Praharsh Joshi</h1>
  <p class="hero-title">Enterprise Sales · Product · Execution</p>

  <div class="hero-stats">
    <div class="stat"><div class="stat-num">500+</div><div class="stat-label">Enterprise users onboarded</div></div>

    <!-- UPDATED LINE -->
    <div class="stat"><div class="stat-num">$750K+</div><div class="stat-label">Enterprise ARR closed & deployed</div></div>

    <div class="stat"><div class="stat-num">₹50K</div><div class="stat-label">Startup grant awarded</div></div>
    <div class="stat"><div class="stat-num">2</div><div class="stat-label">Products shipped</div></div>
  </div>

</section>

</div>

</body>
</html>
